```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحقيقة ظهرت</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#111,#222,#000);
    color:white;
    font-family:Tahoma,sans-serif;
    text-align:center;
    overflow:hidden;
}

.container{
    padding:40px 20px;
    position:relative;
    z-index:2;
}

h1{
    font-size:3rem;
    color:#ff4d4d;
}

.message{
    max-width:700px;
    margin:auto;
    line-height:2;
    font-size:1.2rem;
}

.box{
    margin-top:30px;
    background:rgba(255,255,255,.08);
    padding:20px;
    border-radius:15px;
}

input[type=range]{
    width:80%;
}

#trustValue{
    font-size:2rem;
    color:#ff6666;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ff4d4d;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#d93636;
}

.falling-word{
    position:fixed;
    top:-20px;
    color:#ff5c5c;
    font-weight:bold;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(100vh);
        opacity:0;
    }
}

#finalMessage{
    margin-top:30px;
    font-size:1.2rem;
    line-height:2;
}
</style>
</head>
<body>

<div class="container">

<h1>الحقيقة ظهرت</h1>

<div class="message">
كنت أظن أن الصدق أساس كل شيء،
لكن بعض الحقائق لا تظهر إلا بعد وقت طويل.
<br><br>
هذه الصفحة ليست للانتقام،
بل لتوثيق لحظة فهمت فيها أن الحقيقة كانت مختلفة عما قيل لي.
</div>

<div class="box">
<h2>مستوى الثقة</h2>

<input type="range"
min="0"
max="100"
value="100"
oninput="updateTrust(this.value)">

<h3 id="trustValue">100%</h3>

<p id="trustMsg">
كنت أصدق كل شيء.
</p>
</div>

<button onclick="showFinalMessage()">
الرسالة الأخيرة
</button>

<div id="finalMessage"></div>

</div>

<script>

function updateTrust(val){

let msg="";

if(val>70){
msg="كنت أظن أن كل شيء حقيقي.";
}
else if(val>40){
msg="بدأت ألاحظ التناقضات.";
}
else if(val>10){
msg="الأعذار أصبحت أكثر من الحقائق.";
}
else{
msg="لم يتبق أي ثقة.";
}

document.getElementById("trustValue").innerText=val+"%";
document.getElementById("trustMsg").innerText=msg;
}

function showFinalMessage(){

document.getElementById("finalMessage").innerHTML=`
<h2>رسالة أخيرة</h2>

<p>
ليس كل ما يُقال يكون حقيقيًا،
وليس كل من يعد يفي بوعده.
</p>

<p>
بعض الأشخاص يرحلون،
لكن الدرس الذي يتركونه يبقى.
</p>

<p>
أتمنى لك طريقك الذي اخترته،
وأختار أنا أن أكمل طريقي بعيدًا.
</p>
`;
}

function createWord(){

const words=[
"كذب",
"وعود",
"أعذار",
"حقيقة",
"انتهى",
"ثقة"
];

const item=document.createElement("div");

item.classList.add("falling-word");

item.innerHTML=
words[Math.floor(Math.random()*words.length)];

item.style.left=
Math.random()*100+"vw";

item.style.fontSize=
(Math.random()*15+15)+"px";

item.style.animationDuration=
(Math.random()*3+3)+"s";

document.body.appendChild(item);

setTimeout(()=>{
item.remove();
},6000);
}

setInterval(createWord,400);

</script>

</body>
</html>
