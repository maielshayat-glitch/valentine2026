<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memory</title>
    <style>
        body { background-color: #7b1113; color: white; font-family: Arial, sans-serif; text-align: center; overflow: hidden; }
        #login-screen, #main-content { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #main-content { display: none; background: radial-gradient(circle, #b01e23, #7b1113); }
        .heart { color: #ff4d4d; font-size: 50px; margin-bottom: 20px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        input { padding: 10px; border-radius: 20px; border: none; text-align: center; margin-bottom: 10px; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #ff4d4d; color: white; cursor: pointer; }
        .counter { font-size: 20px; margin-top: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="heart">❤️</div>
        <h3>جاهزة؟</h3>
        <input type="password" id="password" placeholder="كلمة السر">
        <button onclick="checkPass()">Unlock 🔓</button>
    </div>

    <div id="main-content">
        <div class="heart">💖</div>
        <h2 id="days-count">بقالنا مع بعض...</h2>
        <div class="counter" id="timer"></div>
        <p>كل ثانية بتعدي وإنت في قلبي</p>
        <audio id="love-song" loop>
            <source src="أغنيتك_هنا.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('password').value;
            if(pass === "love") { // كلمة السر هنا
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                document.getElementById('love-song').play();
                startTimer();
            } else {
                alert("كلمة السر غلط يا روحي!");
            }
        }

        function startTimer() {
            const startDate = new Date("2025-10-03"); // حطي تاريخ بدايتكم هنا
            setInterval(() => {
                const now = new Date();
                const diff = now - startDate;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const mins = Math.floor((diff / 1000 / 60) % 60);
                const secs = Math.floor((diff / 1000) % 60);
                document.getElementById('timer').innerHTML = 
                    `${days} يوم و ${hours} ساعة و ${mins} دقيقة و ${secs} ثانية`;
            }, 1000);
        }
    </script>
</body>
</html>
